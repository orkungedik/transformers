<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAP ABAP AI Assistant</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            font-size: 2em;
        }

        .subtitle {
            color: #666;
            margin-top: 5px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .panel {
            background: white;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: 600;
        }

        textarea, input, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: 'Courier New', monospace;
        }

        textarea:focus, input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            min-height: 200px;
            resize: vertical;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-success:hover {
            background: #218838;
        }

        .code-output {
            background: #f8f9fa;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 500px;
            overflow-y: auto;
        }

        .analysis-results {
            margin-top: 20px;
        }

        .analysis-item {
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border-left: 4px solid;
        }

        .analysis-item.high {
            background: #ffe6e6;
            border-color: #dc3545;
        }

        .analysis-item.medium {
            background: #fff3cd;
            border-color: #ffc107;
        }

        .analysis-item.low {
            background: #d4edda;
            border-color: #28a745;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .tabs {
            display: flex;
            border-bottom: 2px solid #ddd;
            margin-bottom: 20px;
        }

        .tab {
            padding: 10px 20px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            color: #666;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge.success {
            background: #d4edda;
            color: #155724;
        }

        .status-badge.error {
            background: #f8d7da;
            color: #721c24;
        }

        .git-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚀 SAP ABAP AI Assistant</h1>
            <p class="subtitle">Qwen Coder ile ABAP Kod Üretimi, Analiz ve SAP Entegrasyonu</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('generate')">Kod Üret</button>
            <button class="tab" onclick="switchTab('analyze')">Kod Analiz</button>
            <button class="tab" onclick="switchTab('sap')">SAP Bağlantı</button>
            <button class="tab" onclick="switchTab('git')">Git/abapGit</button>
        </div>

        <div class="main-content">
            <!-- Kod Üret Tab -->
            <div id="generate-tab" class="tab-content active" style="grid-column: 1 / -1;">
                <div class="panel">
                    <h2>ABAP Kod Üretimi</h2>
                    <br>
                    <div class="form-group">
                        <label for="scenario">Senaryo Açıklaması:</label>
                        <textarea id="scenario" placeholder="Örn: Satış siparişi oluşturma programı. Kullanıcıdan malzeme kodu ve miktar alıp, VA01 transaction'ını BAPI ile çağırsın..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="outputType">Çıktı Tipi:</label>
                        <select id="outputType">
                            <option value="program">ABAP Program (REPORT)</option>
                            <option value="function_module">Function Module</option>
                            <option value="class">ABAP Class</option>
                            <option value="interface">Interface</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>
                            <input type="checkbox" id="includeTests" checked> Test Kodları Dahil Et
                        </label>
                    </div>

                    <button onclick="generateCode()" id="generateBtn">
                        🤖 AI ile Kod Üret
                    </button>

                    <div id="generatedCodeSection" style="margin-top: 20px; display: none;">
                        <h3>Üretilen ABAP Kodu:</h3>
                        <div class="code-output" id="generatedCode"></div>
                        
                        <div class="btn-group">
                            <button class="btn-secondary" onclick="copyCode()">📋 Kopyala</button>
                            <button class="btn-success" onclick="downloadCode()">💾 İndir</button>
                            <button onclick="analyzeGeneratedCode()">🔍 Analiz Et</button>
                        </div>

                        <div id="analysisResults" class="analysis-results"></div>
                    </div>
                </div>
            </div>

            <!-- Kod Analiz Tab -->
            <div id="analyze-tab" class="tab-content" style="grid-column: 1 / -1;">
                <div class="panel">
                    <h2>ABAP Kod Analizi</h2>
                    <br>
                    <div class="form-group">
                        <label for="analyzeCode">ABAP Kodu:</label>
                        <textarea id="analyzeCode" placeholder="Analiz edilecek ABAP kodunu yapıştırın..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="analysisType">Analiz Tipi:</label>
                        <select id="analysisType">
                            <option value="all">Tümü (Performans + Güvenlik + Syntax)</option>
                            <option value="performance">Performans Analizi</option>
                            <option value="security">Güvenlik Analizi</option>
                            <option value="syntax">Syntax Kontrolü</option>
                        </select>
                    </div>

                    <button onclick="analyzeCode()" id="analyzeBtn">
                        🔍 Analiz Başlat
                    </button>

                    <div id="analysisOutput" style="margin-top: 20px; display: none;">
                        <h3>Analiz Sonuçları:</h3>
                        <div id="analysisDetails"></div>
                    </div>
                </div>
            </div>

            <!-- SAP Bağlantı Tab -->
            <div id="sap-tab" class="tab-content" style="grid-column: 1 / -1;">
                <div class="panel">
                    <h2>SAP Sistem Bağlantısı (RFC)</h2>
                    <br>
                    <div class="form-group">
                        <label for="sapHost">SAP Host:</label>
                        <input type="text" id="sapHost" placeholder="localhost" value="localhost">
                    </div>

                    <div class="form-group">
                        <label for="sapPort">Port:</label>
                        <input type="number" id="sapPort" placeholder="3300" value="3300">
                    </div>

                    <div class="form-group">
                        <label for="sapClient">Client:</label>
                        <input type="text" id="sapClient" placeholder="100" value="100">
                    </div>

                    <div class="form-group">
                        <label for="sapUser">Kullanıcı:</label>
                        <input type="text" id="sapUser" placeholder="SAPUSER">
                    </div>

                    <div class="form-group">
                        <label for="sapPassword">Şifre:</label>
                        <input type="password" id="sapPassword" placeholder="********">
                    </div>

                    <button onclick="connectToSAP()" id="connectBtn">
                        🔌 Bağlan
                    </button>

                    <div id="sapStatus" style="margin-top: 20px;"></div>

                    <div class="git-section">
                        <h3>ABAP Objesini SAP'ye Yükle</h3>
                        <br>
                        <div class="form-group">
                            <label for="objectName">Obje Adı:</label>
                            <input type="text" id="objectName" placeholder="ZPROGRAM_NAME">
                        </div>

                        <div class="form-group">
                            <label for="objectType">Obje Tipi:</label>
                            <select id="objectType">
                                <option value="program">Program</option>
                                <option value="function">Function Module</option>
                                <option value="class">Class</option>
                            </select>
                        </div>

                        <button onclick="uploadToSAP()" class="btn-success">
                            ⬆️ SAP'ye Yükle
                        </button>
                    </div>
                </div>
            </div>

            <!-- Git/abapGit Tab -->
            <div id="git-tab" class="tab-content" style="grid-column: 1 / -1;">
                <div class="panel">
                    <h2>Azure DevOps / abapGit Entegrasyonu</h2>
                    <br>
                    
                    <div class="form-group">
                        <label for="repoUrl">Repository URL:</label>
                        <input type="text" id="repoUrl" placeholder="https://dev.azure.com/org/project/_git/repo">
                    </div>

                    <div class="form-group">
                        <label for="gitBranch">Branch:</label>
                        <input type="text" id="gitBranch" value="master">
                    </div>

                    <div class="btn-group">
                        <button onclick="cloneRepo()" id="cloneBtn">
                            📥 Clone
                        </button>
                        <button onclick="pullRepo()" class="btn-secondary">
                            ⬇️ Pull
                        </button>
                        <button onclick="pushRepo()" class="btn-success">
                            ⬆️ Push
                        </button>
                    </div>

                    <div class="form-group" style="margin-top: 20px;">
                        <label for="commitMessage">Commit Mesajı:</label>
                        <input type="text" id="commitMessage" value="AI generated ABAP code">
                    </div>

                    <button onclick="checkStatus()" style="margin-top: 10px;">
                        📊 Durum Kontrolü
                    </button>

                    <div id="gitStatus" style="margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        let currentGeneratedCode = '';

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(`${tabName}-tab`).classList.add('active');
        }

        async function generateCode() {
            const scenario = document.getElementById('scenario').value;
            const outputType = document.getElementById('outputType').value;
            const includeTests = document.getElementById('includeTests').checked;

            if (!scenario.trim()) {
                alert('Lütfen bir senaryo girin!');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Üretiliyor...';

            try {
                const response = await fetch(`${API_BASE}/generate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        scenario: scenario,
                        output_type: outputType,
                        include_tests: includeTests
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    currentGeneratedCode = data.code;
                    document.getElementById('generatedCode').textContent = data.code;
                    document.getElementById('generatedCodeSection').style.display = 'block';
                    
                    // Analiz sonuçlarını göster
                    displayAnalysis(data.analysis, 'analysisResults');
                } else {
                    alert('Kod üretimi başarısız: ' + (data.detail || 'Bilinmeyen hata'));
                }
            } catch (error) {
                alert('Hata: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🤖 AI ile Kod Üret';
            }
        }

        async function analyzeCode() {
            const code = document.getElementById('analyzeCode').value;
            const analysisType = document.getElementById('analysisType').value;

            if (!code.trim()) {
                alert('Lütfen analiz edilecek kod girin!');
                return;
            }

            const btn = document.getElementById('analyzeBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Analiz Ediliyor...';

            try {
                const response = await fetch(`${API_BASE}/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        abap_code: code,
                        analysis_type: analysisType
                    })
                });

                const data = await response.json();
                
                if (data.status === 'success') {
                    document.getElementById('analysisOutput').style.display = 'block';
                    displayAnalysis(data.analysis, 'analysisDetails');
                }
            } catch (error) {
                alert('Hata: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔍 Analiz Başlat';
            }
        }

        async function analyzeGeneratedCode() {
            if (!currentGeneratedCode) return;
            
            document.getElementById('analyzeCode').value = currentGeneratedCode;
            document.getElementById('analysisType').value = 'all';
            await analyzeCode();
        }

        function displayAnalysis(analysis, containerId) {
            const container = document.getElementById(containerId);
            let html = '';

            if (analysis.performance && analysis.performance.length > 0) {
                html += '<h4>⚡ Performans Bulguları:</h4>';
                analysis.performance.forEach(item => {
                    html += `<div class="analysis-item ${item.severity}">
                        <strong>Satır ${item.line}:</strong> ${item.issue}<br>
                        <em>Öneri: ${item.suggestion}</em>
                    </div>`;
                });
            }

            if (analysis.security && analysis.security.length > 0) {
                html += '<h4>🔒 Güvenlik Bulguları:</h4>';
                analysis.security.forEach(item => {
                    html += `<div class="analysis-item ${item.severity}">
                        <strong>Satır ${item.line}:</strong> ${item.issue}<br>
                        <em>Öneri: ${item.suggestion}</em>
                    </div>`;
                });
            }

            if (analysis.syntax && analysis.syntax.length > 0) {
                html += '<h4>📝 Syntax Kontrolü:</h4>';
                analysis.syntax.forEach(item => {
                    html += `<div class="analysis-item ${item.severity}">
                        <strong>Satır ${item.line}:</strong> ${item.issue}<br>
                        <em>Öneri: ${item.suggestion}</em>
                    </div>`;
                });
            }

            if (analysis.recommendations && analysis.recommendations.length > 0) {
                html += '<h4>💡 Öneriler:</h4><ul>';
                analysis.recommendations.forEach(rec => {
                    html += `<li>${rec}</li>`;
                });
                html += '</ul>';
            }

            if (!html) {
                html = '<p class="status-badge success">✓ Sorun bulunamadı. Kod temiz görünüyor!</p>';
            }

            container.innerHTML = html;
        }

        async function connectToSAP() {
            const config = {
                host: document.getElementById('sapHost').value,
                port: parseInt(document.getElementById('sapPort').value),
                client: document.getElementById('sapClient').value,
                user: document.getElementById('sapUser').value,
                password: document.getElementById('sapPassword').value
            };

            const btn = document.getElementById('connectBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span>Bağlanıyor...';

            try {
                const response = await fetch(`${API_BASE}/sap/connect`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(config)
                });

                const data = await response.json();
                
                const statusDiv = document.getElementById('sapStatus');
                if (data.status === 'success') {
                    statusDiv.innerHTML = '<p class="status-badge success">✓ SAP bağlantısı başarılı!</p>';
                } else {
                    statusDiv.innerHTML = `<p class="status-badge error">✗ Bağlantı hatası: ${data.detail}</p>`;
                }
            } catch (error) {
                document.getElementById('sapStatus').innerHTML = 
                    `<p class="status-badge error">✗ Hata: ${error.message}</p>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = '🔌 Bağlan';
            }
        }

        async function uploadToSAP() {
            if (!currentGeneratedCode) {
                alert('Önce kod üretin!');
                return;
            }

            const objectName = document.getElementById('objectName').value;
            const objectType = document.getElementById('objectType').value;

            if (!objectName) {
                alert('Lütfen obje adı girin!');
                return;
            }

            try {
                const params = new URLSearchParams({
                    object_name: objectName,
                    object_type: objectType,
                    code: currentGeneratedCode
                });

                const response = await fetch(`${API_BASE}/sap/upload?${params}`, {
                    method: 'POST'
                });

                const data = await response.json();
                alert(data.message || 'Yükleme tamamlandı!');
            } catch (error) {
                alert('Hata: ' + error.message);
            }
        }

        async function cloneRepo() {
            const repoUrl = document.getElementById('repoUrl').value;
            const branch = document.getElementById('gitBranch').value;

            if (!repoUrl) {
                alert('Repository URL gerekli!');
                return;
            }

            const btn = document.getElementById('cloneBtn');
            btn.disabled = true;

            try {
                const response = await fetch(`${API_BASE}/git/clone`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        repo_url: repoUrl,
                        branch: branch
                    })
                });

                const data = await response.json();
                document.getElementById('gitStatus').innerHTML = 
                    `<p class="status-badge ${data.status}">${data.message}</p>`;
            } catch (error) {
                alert('Hata: ' + error.message);
            } finally {
                btn.disabled = false;
            }
        }

        async function pullRepo() {
            alert('Pull işlemi için repo path gerekli. Bu özellik geliştirme aşamasındadır.');
        }

        async function pushRepo() {
            alert('Push işlemi için repo path gerekli. Bu özellik geliştirme aşamasındadır.');
        }

        async function checkStatus() {
            alert('Durum kontrolü için repo path gerekli. Bu özellik geliştirme aşamasındadır.');
        }

        function copyCode() {
            navigator.clipboard.writeText(currentGeneratedCode);
            alert('Kod kopyalandı!');
        }

        function downloadCode() {
            const blob = new Blob([currentGeneratedCode], { type: 'text/plain' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'z_ai_generated.abap';
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
